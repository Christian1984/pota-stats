# Full local stack — builds and runs all containers locally.
# Usage: docker compose -f docker-compose.local.yml up --build
services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://pota:${POSTGRES_PASSWORD}@db:5432/pota_stats
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  poller:
    build:
      context: .
      dockerfile: apps/poller/Dockerfile
    environment:
      DATABASE_URL: postgresql://pota:${POSTGRES_PASSWORD}@db:5432/pota_stats
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: pota_stats
      POSTGRES_USER: pota
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pota -d pota_stats"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
